name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "package.json"

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    env:
      RELEASE_ASSET_NAME: yishe-ps-windows.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        shell: pwsh
        run: |
          $pkg = Get-Content -Raw package.json | ConvertFrom-Json
          $ver = [string]$pkg.version
          if ([string]::IsNullOrWhiteSpace($ver)) { throw "package.json version is empty" }
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "VERSION=$ver"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build exe (PyInstaller spec)
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm ps.spec

      - name: Prepare release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          $sourceExe = "dist\\ps.exe"
          if (-not (Test-Path $sourceExe)) { throw "Built exe not found: $sourceExe" }
          $releaseExe = "out/$env:RELEASE_ASSET_NAME"
          if (Test-Path $releaseExe) { Remove-Item -Force $releaseExe }
          Copy-Item -LiteralPath $sourceExe -Destination $releaseExe
          Write-Host "Prepared $releaseExe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yishe-ps-${{ env.VERSION }}-windows-exe
          path: out/${{ env.RELEASE_ASSET_NAME }}
          if-no-files-found: error

      - name: Create tag (vVERSION) if missing
        shell: pwsh
        run: |
          $tag = "v$env:VERSION"
          git fetch --tags --force
          $exists = (git tag -l $tag)
          if ($exists) {
            Write-Host "Tag already exists: $tag"
            exit 0
          }
          Write-Host "Creating tag: $tag"
          git tag $tag
          git push origin $tag

      - name: Remove old uploaded release assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v$env:VERSION"
          $expectedAsset = $env:RELEASE_ASSET_NAME
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $releaseUrl = "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases/tags/$tag"

          try {
            $release = Invoke-RestMethod -Headers $headers -Uri $releaseUrl
          } catch {
            $statusCode = $_.Exception.Response.StatusCode.value__
            if ($statusCode -eq 404) {
              Write-Host "Release not found for $tag yet, skipping asset cleanup"
              exit 0
            }
            throw
          }

          $assetsToDelete = @($release.assets | Where-Object { $_.name -ne $expectedAsset })
          if ($assetsToDelete.Count -eq 0) {
            Write-Host "No old uploaded assets to delete"
            exit 0
          }

          foreach ($asset in $assetsToDelete) {
            $deleteUrl = "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases/assets/$($asset.id)"
            Write-Host "Deleting old asset: $($asset.name)"
            Invoke-RestMethod -Headers $headers -Method Delete -Uri $deleteUrl
          }

      - name: Publish GitHub Release (auto)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: out/${{ env.RELEASE_ASSET_NAME }}
          overwrite_files: true
          generate_release_notes: true
